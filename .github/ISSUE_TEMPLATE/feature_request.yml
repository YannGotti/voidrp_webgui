name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What do you want?
      placeholder: Describe the feature. What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      placeholder: How would you use this in your server or modpack?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds you tried?
